<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シノビガミ徹底攻略-比良坂機関</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #2a2a2a;
  color: #fff;
}

/* タイトル */
h1 {
  text-align: center;
  padding: 20px 0;
  margin: 0;
  background: #111;
}
.container h2 {
    text-align: center;
    background-color: #1f1f1f;
    padding: 10px;
    border: 1px solid;
    border-radius: 10px;
}
/* ===== メニュー ===== */
.menu {
  display: flex;
  justify-content: center;
  overflow-x: auto;
  gap: 10px;
  padding: 15px 0;
  background: #1a1a1a;
  border-bottom: 1px solid #444;
}

/* メニューアイテム（枠線だけ） */
.menu-item {
  flex: 0 0 auto;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 14px;
  border: 1px solid #666;
  background: transparent;
  transition: 0.2s;
}

/* ホバー */
.menu-item:hover {
  border-color: #aaa;
  background: #333;
}

/* ===== コンテンツ ===== */
.container {
  max-width: 1200px;
  margin: auto;
}

.controls {
  padding: 10px;
  text-align: center;
}

input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

/* ===== 追加：サブメニューのスタイル ===== */
.submenu {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 0;
}

.sub-item {
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  border: 1px solid #555;
  background: #333;
  color: #ccc;
  transition: 0.2s;
}

.sub-item:hover, .sub-item.active {
  border-color: #aaa;
  background: #444;
  color: #fff;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 15px;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* 一覧カード */
.card {
  min-height: 180px;
  overflow: hidden;
  padding: 15px;
  border-radius: 10px;
  background: linear-gradient(145deg, #2e2e2e, #1f1f1f);
  border: 1px solid #666;
  transition: 0.2s;
}

/* テキスト */
.title {
  font-weight: bold;
  margin-bottom: 5px;
  font-size: 1.1em;
  border-bottom: 1px solid;
  padding-bottom: 5px;
}

.meta {
  font-size: 13px;
  color: #bbb;
  margin-bottom: 8px;
}

.desc {
  font-size: 14px;
  line-height: 1.6;
  max-height: 120px;
  overflow: auto;
}

/* ページネーション */
.pagination {
  text-align: center;
  padding: 10px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>

<body>

<h1>比良坂期間</h1>

<div class="menu">
  <div class="menu-item general" onclick="location.href='index.html'">HOME</div>
  <div class="menu-item general" onclick="location.href='hanyou.html'">汎用忍法</div>
  <div class="menu-item hasuba" onclick="location.href='hasuba.html'">斜歯忍軍</div>
  <div class="menu-item kurama" onclick="location.href='kurama.html'">鞍馬神流</div>
  <div class="menu-item hagure" onclick="location.href='hagure.html'">ハグレモノ</div>
  <div class="menu-item hirasaka" onclick="location.href='hirasaka.html'">比良坂期間</div>
  <div class="menu-item gakuen" onclick="location.href='gakuen.html'">私立御斎学園</div>
  <div class="menu-item kettou" onclick="location.href='kettou.html'">隠忍の血統</div>
  <div class="menu-item koryu" onclick="location.href='koryu.html'">古流忍法</div>
</div>

<div class="container">

<div class="controls">
  <input type="text" id="search" placeholder="忍法名で検索">
  <select id="filter">
    <option value="">すべて</option>
    <option value="攻撃">攻撃</option>
    <option value="サポート">サポート</option>
    <option value="装備">装備</option>
  </select>
  
  <div class="submenu">
    <div class="sub-item active" onclick="setSubCategory(this, '')">●すべて</div>
    <div class="sub-item" onclick="setSubCategory(this, '流派')">●流派</div>
    <div class="sub-item" onclick="setSubCategory(this, '秘伝')">●秘伝</div>
    <div class="sub-item" onclick="setSubCategory(this, '鍔鑿勢')">●常夜</div>
    <div class="sub-item" onclick="setSubCategory(this, '大槌群')">●醜女衆</div>
    <div class="sub-item" onclick="setSubCategory(this, '指短班')">●公安隠密局</div>
    <div class="sub-item" onclick="setSubCategory(this, '釘衆')">●麝香会総合病院</div>
    <div class="sub-item" onclick="setSubCategory(this, '鍵盤勢')">●外事N課</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="pagination">
  <button id="prev">前へ</button>
  <span id="pageInfo"></span>
  <button id="next">次へ</button>
</div>

</div>

<script>
const ITEMS_PER_PAGE = 12;
let currentPage = 1;
let currentSubCategory = ''; // 追加：選択中のサブメニュー属性

const data = [
{
    name:"雀蜂（すずめばち）",
    type:"攻撃",
    category:"流派",
    meta:"間合 4 / コスト 2 / 指定特技 人脈",
    desc:"集団戦。この攻撃の命中判定のスペシャル値は11となる。攻撃が成功すると、目標に集団戦ダメージ1点を与える。もしこの命中判定がスペシャルで攻撃が成功した場合、通常の効果に加え、さらに射撃戦ダメージを2点与えることができる。"
  },
  {
    name:"無面目（むめんもく）",
    type:"サポート",
    category:"流派",
    meta:"間合 なし / コスト なし / 指定特技 隠蔽術",
    desc:"誰かが情報判定に成功し、この忍法の持ち主の【秘密】を獲得しようとしたときに使用できる。その情報判定を行った者を目標に選ぶ。指定特技の判定に成功すると、目標の情報判定を失敗させることができる。ただし、目標が同じシーンに登場しているキャラクターだった場合、指定特技の判定にマイナス2の修正がつく。"
  },
  {
    name:"情報戦（じょうほうせん）",
    type:"サポート",
    category:"流派",
    meta:"間合 なし / コスト 1 / 指定特技 調査術",
    desc:"自分がシーンプレイヤー時のドラマシーンに使用できる。好きなキャラクターを目標に選ぶ。指定特技の判定に成功すると、目標の命中判定と奥義破り判定にプラスの修正がつく。この効果はセッションが終了するまで持続し、累積しない。"
  },
  {
    name:"人遁（じんとん）",
    type:"サポート",
    category:"流派",
    meta:"間合 なし / コスト 1 / 指定特技 詐術",
    desc:"戦闘中、戦場が「雑踏」の場合、自分の手番に使用できる。指定特技の判定に成功すると、この忍法の使用者に対する命中判定にマイナス2の修正がつく。また、この忍法の使用者が行う命中判定に＋２の修正がつく。この効果は累積せず、戦場が変更されるか戦闘が終了するまで持続する。"
  },
  {
    name:"怪文（かいぶん）",
    type:"サポート",
    category:"流派",
    meta:"間合 なし / コスト なし / 指定特技 流言の術",
    desc:"自分が【情報】を獲得したときに使用できる。好きなキャラクターを好きな数だけ目標に選ぶ。指定特技の判定に成功すると、その全員にその【情報】を渡すことができる。"
  },
  {
    name:"内偵（ないてい）",
    type:"装備",
    category:"流派",
    meta:"間合 なし / コスト なし / 指定特技 なし",
    desc:"自分が情報判定を行うときに使用できる。サイコロを振らず、情報判定に自動的に成功することができる（スペシャルではない。達成値が必要な場合は10になる）。"
  },
  {
    name:"口蜜（くみつ）",
    type:"サポート",
    category:"流派",
    meta:"間合 なし / コスト なし / 指定特技 医術",
    desc:"自分が情報判定に成功したときに使用できる。自分が【感情】を得たキャラクターを目標に選ぶ。指定特技の判定に成功すると、目標の汚れを1つ回復し、目標の異形一つを未収得の状態にする。そして自分の汚れ一つを受け、異形一つを発現する。"
  },
  {
    name:"毒果（どくか）",
    type:"サポート",
    category:"流派",
    meta:"間合 なし / コスト 4 / 指定特技 毒術",
    desc:"誰かが「兵糧丸」を使用したときに使用できる。「兵糧丸」を使用したキャラクターを目標に選ぶ。指定特技の判定に成功すると、目標は追加ではない【生命力】のスロットを1つ選び、それに「汚れ」を受ける。"
  },
  {
    name:"薬師閨（やくしけい）",
    type:"サポート",
    category:"流派",
    meta:"間合 なし / コスト なし / 指定特技 九ノ一の術",
    desc:"自分に対して、誰かがプラスの【感情】を獲得したときに使用できる。指定特技の判定に成功すると、「兵糧丸」を1つ獲得できる。"
  },
  {
    name:"医療（いりょう）",
    type:"サポート",
    category:"流派",
    meta:"間合 1 / コスト 3 / 指定特技 医術",
    desc:"この忍法を修得したときに変調一種を選ぶ。自分の手番で使用できる（戦闘シーンの場合は攻撃を行う代わりに使用できる）。ドラマシーンなら、好きなキャラクターを目標に選ぶ。戦闘中なら、この忍法の間合内のキャラクターを目標に選ぶ。指定特技の判定に成功すると、目標にその変調一つを与えるか、目標の受けているその変調一つを回復するかどちらかを行うことができる。"
  },
  {
    name:"枕事（まくらごと）",
    type:"サポート",
    category:"流派",
    meta:"間合 なし / コスト なし / 指定特技 九ノ一の術",
    desc:"自分が登場している自分以外がシーンプレイヤーのドラマシーンで、誰かが情報判定を行おうとしたときに使用できる。その情報判定を行おうとしている者を目標に選ぶ。指定特技の判定に成功すると、目標が情報判定でどの【情報】を獲得するか、または【秘密】か【居所】のどちらを獲得するかを、この忍法の使用者が決定できる。ただし、目標がすでに獲得している【情報】を獲得するように決定することはできない。"
  },
  {
    name:"救命針（きゅうめいばり）",
    type:"装備",
    category:"流派",
    meta:"間合 なし / コスト なし / 指定特技 なし",
    desc:"攻撃が成功したとき、攻撃忍法の効果を与える代わりに、その目標に対して「兵糧丸」を使用することができるようになる（所持している数の範囲なら、1回の攻撃で複数の「兵糧丸」を使用してもよい）。また、複数の目標を攻撃している場合、目標ごとに通常の効果の使用と「兵糧丸」の使用を使い分けてもよい。"
  },

];

const grid = document.getElementById("grid");

// 追加：サブメニュー切り替え関数
function setSubCategory(element, cat) {
  currentSubCategory = cat;
  currentPage = 1; // ページを1に戻す
  
  // ボタンのアクティブ表示切り替え
  document.querySelectorAll('.sub-item').forEach(btn => {
    btn.classList.remove('active');
  });
  element.classList.add('active');
  
  render();
}

function getFilteredData() {
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  return data
    .filter(d =>
      d.name.toLowerCase().includes(search) ||
      d.desc.toLowerCase().includes(search)
    )
    .filter(d => !filter || d.type.includes(filter))
    // 追加：サブメニューによる絞り込み（空文字の場合は全表示）
    .filter(d => !currentSubCategory || d.category === currentSubCategory);
}

function render() {
  const filtered = getFilteredData();
  const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);

  if (currentPage > totalPages) currentPage = totalPages || 1;

  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageData = filtered.slice(start, start + ITEMS_PER_PAGE);

  grid.innerHTML = "";

  if (filtered.length === 0) {
    grid.innerHTML = "<p style='text-align:center;'>該当する忍法がありません</p>";
    document.getElementById("pageInfo").textContent = "";
    document.getElementById("prev").disabled = true;
    document.getElementById("next").disabled = true;
    return;
  }

  pageData.forEach(d => {
    const card = document.createElement("div");
    card.className = "card";
    
    // サブカテゴリーの表示も追加したい場合は、以下のmeta部分を調整してください
    card.innerHTML = `
      <div class="title">${d.name}</div>
      <div class=meta>${d.category || '未設定'} / ${d.type} / ${d.meta}</div>
      <div class=desc>${d.desc}</div>
    `;
    grid.appendChild(card);
  });

  document.getElementById("pageInfo").textContent =
    `${currentPage} / ${totalPages}`;

  document.getElementById("prev").disabled = currentPage === 1;
  document.getElementById("next").disabled = currentPage === totalPages;
}

document.getElementById("search").addEventListener("input", () => {
  currentPage = 1;
  render();
});

document.getElementById("filter").addEventListener("change", () => {
  currentPage = 1;
  render();
});

document.getElementById("prev").addEventListener("click", () => {
  currentPage--;
  render();
});

document.getElementById("next").addEventListener("click", () => {
  currentPage++;
  render();
});

render();
</script>

</body>
</html>
