<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #2a2a2a;
  color: #fff;
  line-height: 1.5;
}

/* タイトル */
h1 {
  text-align: center;
  padding: 20px 0;
  margin: 0;
  background: #111;
  font-size: 24px;
}
.container h2 {
    text-align: center;
    background-color: #1f1f1f;
    padding: 10px;
    border: 1px solid;
    border-radius: 10px;
}
/* ===== メニュー（修正箇所） ===== */
.menu {
  display: flex;
  justify-content: center; 
  overflow-x: auto;
  /* スムーズなスクロール（iOS用） */
  -webkit-overflow-scrolling: touch; 
  gap: 10px;
  /* 左右にパディングを入れることで、端のアイテムが壁に張り付くのを防ぐ */
  padding: 15px 20px; 
  background: #1a1a1a;
  border-bottom: 1px solid #444;
}

/* スクロールバーの見た目を少し整える（任意） */
.menu::-webkit-scrollbar {
  height: 4px;
}
.menu::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}

/* メニューアイテム（枠線だけ） */
.menu-item {
  flex: 0 0 auto;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 14px;
  border: 1px solid #666;
  background: transparent;
  transition: 0.2s;
}

/* ホバー */
.menu-item:hover {
  border-color: #aaa;
  background: #333;
}

/* ===== コンテンツ ===== */
.container {
  max-width: 1200px;
  margin: auto;
}

.controls {
  padding: 10px;
  text-align: center;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  font-size: 16px; /* 入力しやすく大きく */
}

/* ===== サブメニューのスタイル ===== */
.submenu {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 0;
}

.sub-item {
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  border: 1px solid #555;
  background: #333;
  color: #ccc;
  transition: 0.2s;
}

.sub-item:hover, .sub-item.active {
  border-color: #aaa;
  background: #444;
  color: #fff;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 15px;
}

/* 一覧カード */
.card {
  min-height: 180px;
  overflow: hidden;
  padding: 15px;
  border-radius: 10px;
  background: linear-gradient(145deg, #2e2e2e, #1f1f1f);
  border: 1px solid #666;
  transition: 0.2s;
}

/* テキスト */
.title {
  font-weight: bold;
  margin-bottom: 5px;
  font-size: 1.1em;
  border-bottom: 1px solid;
  padding-bottom: 5px;
  color: #ffda79; /* タイトルを見やすく */
}

.meta {
  font-size: 13px;
  color: #bbb;
  margin-bottom: 8px;
}

.desc {
  font-size: 14px;
  line-height: 1.6;
}

/* ページネーション */
.pagination {
  text-align: center;
  padding: 20px 10px;
}

button {
  padding: 10px 16px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  background: #444;
  color: white;
}

button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ==========================================
   スマホ向け調整 (768px以下)
========================================== */
@media (max-width: 768px) {
  h1 { font-size: 20px; }
  .menu {
    justify-content: flex-start; 
  }
  /* 2列表示に変更 */
  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px; /* 間隔を少し詰める */
    padding: 10px;
  }

  /* カード内の文字サイズを大きく */
  .card {
    padding: 12px;
    min-height: auto;
  }

  .title {
    font-size: 1.2em; /* タイトルを大きく */
  }

  .meta {
    font-size: 13px;
    line-height: 1.3;
  }

  .desc {
    font-size: 13px;
    line-height: 1.5;
  }

  /* コントロール（検索・ボタン）のサイズアップ */
  input, select, .sub-item, button {
    font-size: 12px;
  }
  
}

/* さらに小さい画面（400px以下）での微調整 */
@media (max-width: 400px) {
  .grid {
    grid-template-columns: 1fr; /* 非常に狭い場合は1列 */
  }
}

</style>
</head>

    desc:"追加の【生命力】とそのスロットを2点獲得し、自分の回避判定にマイナス2の修正がつく。さらに、この忍法を修得している場合、【機忍】で特例修得している忍法のコストが1上昇する。"
}
];

const grid = document.getElementById("grid");

// 追加：サブメニュー切り替え関数
function setSubCategory(element, cat) {
  currentSubCategory = cat;
  currentPage = 1; // ページを1に戻す
  
  // ボタンのアクティブ表示切り替え
  document.querySelectorAll('.sub-item').forEach(btn => {
    btn.classList.remove('active');
  });
  element.classList.add('active');
  
  render();
}

function getFilteredData() {
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  return data
    .filter(d =>
      d.name.toLowerCase().includes(search) ||
      d.desc.toLowerCase().includes(search)
    )
    .filter(d => !filter || d.type.includes(filter))
    // 追加：サブメニューによる絞り込み（空文字の場合は全表示）
    .filter(d => !currentSubCategory || d.category === currentSubCategory);
}

function render() {
  const filtered = getFilteredData();
  const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);

  if (currentPage > totalPages) currentPage = totalPages || 1;

  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageData = filtered.slice(start, start + ITEMS_PER_PAGE);

  grid.innerHTML = "";

  if (filtered.length === 0) {
    grid.innerHTML = "<p style='text-align:center;'>該当する忍法がありません</p>";
    document.getElementById("pageInfo").textContent = "";
    document.getElementById("prev").disabled = true;
    document.getElementById("next").disabled = true;
    return;
  }

  pageData.forEach(d => {
    const card = document.createElement("div");
    card.className = "card";
    
    // サブカテゴリーの表示も追加したい場合は、以下のmeta部分を調整してください
    card.innerHTML = `
      <div class="title">${d.name}</div>
      <div class="meta">${d.category || '未設定'} / ${d.type} / ${d.meta}</div>
      <div class="desc">${d.desc}</div>
    `;
    grid.appendChild(card);
  });

  document.getElementById("pageInfo").textContent =
    `${currentPage} / ${totalPages}`;

  document.getElementById("prev").disabled = currentPage === 1;
  document.getElementById("next").disabled = currentPage === totalPages;
}

document.getElementById("search").addEventListener("input", () => {
  currentPage = 1;
  render();
});

document.getElementById("filter").addEventListener("change", () => {
  currentPage = 1;
  render();
});

document.getElementById("prev").addEventListener("click", () => {
  currentPage--;
  render();
});

document.getElementById("next").addEventListener("click", () => {
  currentPage++;
  render();
});

render();
</script>

</body>
</html>
