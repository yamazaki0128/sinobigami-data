<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シノビガミ徹底攻略-汎用忍法</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #2a2a2a;
  color: #fff;
}

/* タイトル */
h1 {
  text-align: center;
  padding: 20px 0;
  margin: 0;
  background: #111;
}
.container h2 {
    text-align: center;
    background-color: #1f1f1f;
    padding: 10px;
    border: 1px solid;
    border-radius: 10px;
}
/* ===== メニュー ===== */
.menu {
  display: flex;
  justify-content: center;
  overflow-x: auto;
  gap: 10px;
  padding: 15px 0;
  background: #1a1a1a;
  border-bottom: 1px solid #444;
}

/* メニューアイテム（枠線だけ） */
.menu-item {
  flex: 0 0 auto;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 14px;
  border: 1px solid #666;
  background: transparent;
  transition: 0.2s;
}

/* ホバー */
.menu-item:hover {
  border-color: #aaa;
  background: #333;
}

/* ===== コンテンツ ===== */
.container {
  max-width: 1200px;
  margin: auto;
}

.controls {
  padding: 10px;
  text-align: center;
}

input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 15px;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* 一覧カード */
.card {
  min-height: 180px;
  overflow: hidden;
  padding: 15px;
  border-radius: 10px;
  background: linear-gradient(145deg, #2e2e2e, #1f1f1f);
  border: 1px solid #666;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #aaa;
}

/* テキスト */
.title {
  font-weight: bold;
  margin-bottom: 5px;
  font-size: 1.1em;
  border-bottom: 1px solid;
  padding-bottom: 5px;
}

.meta {
  font-size: 13px;
  color: #bbb;
  margin-bottom: 8px;
}

.desc {
  font-size: 14px;
  line-height: 1.6;
  max-height: 120px;
  overflow: auto;
}

/* ページネーション */
.pagination {
  text-align: center;
  padding: 10px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>

<body>

<h1>汎用忍法</h1>

<!-- ===== メニュー追加 ===== -->
<div class="menu">
  <div class="menu-item general" onclick="location.href='hanyou.html'">汎用忍法</div>
  <div class="menu-item shiba" onclick="location.href='shiba.html'">斜歯忍軍</div>
  <div class="menu-item kurama" onclick="location.href='kurama.html'">鞍馬神流</div>
  <div class="menu-item hagure" onclick="location.href='hagure.html'">ハグレモノ</div>
  <div class="menu-item hirasaka" onclick="location.href='hirasaka.html'">比良坂機関</div>
  <div class="menu-item gakuen" onclick="location.href='gakuen.html'">私立御斎学園</div>
  <div class="menu-item kettou" onclick="location.href='kettou.html'">隠忍の血統</div>
  <div class="menu-item koryu" onclick="location.href='koryu.html'">古流忍法</div>

</div>

<div class="container">

<h2>汎用忍法</h2>

<div class="controls">
  <input type="text" id="search" placeholder="忍法名で検索">
  <select id="filter">
    <option value="">すべて</option>
    <option value="攻撃">攻撃</option>
    <option value="サポート">サポート</option>
    <option value="装備">装備</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<div class="pagination">
  <button id="prev">前へ</button>
  <span id="pageInfo"></span>
  <button id="next">次へ</button>
</div>

</div>

<script>
const ITEMS_PER_PAGE = 12;
let currentPage = 1;

const data = [
{
name:"接近戦攻撃（せっきんせんこうげき）",
type:"攻撃",
meta:"間合1 / コストなし",
desc:"接近戦攻撃。攻撃が成功すると、目標に接近戦ダメージを1点与えることができる。"
}
];

const grid = document.getElementById("grid");

function getFilteredData() {
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  return data
    .filter(d =>
      d.name.toLowerCase().includes(search) ||
      d.desc.toLowerCase().includes(search)
    )
    .filter(d => !filter || d.type.includes(filter));
}

function render() {
  const filtered = getFilteredData();
  const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);

  if (currentPage > totalPages) currentPage = totalPages || 1;

  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageData = filtered.slice(start, start + ITEMS_PER_PAGE);

  grid.innerHTML = "";

  if (filtered.length === 0) {
    grid.innerHTML = "<p style='text-align:center;'>該当する忍法がありません</p>";
    document.getElementById("pageInfo").textContent = "";
    return;
  }

  pageData.forEach(d => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="title">${d.name}</div>
      <div class="meta">${d.type} / ${d.meta}</div>
      <div class="desc">${d.desc}</div>
    `;
    grid.appendChild(card);
  });

  document.getElementById("pageInfo").textContent =
    `${currentPage} / ${totalPages}`;

  document.getElementById("prev").disabled = currentPage === 1;
  document.getElementById("next").disabled = currentPage === totalPages;
}

document.getElementById("search").addEventListener("input", () => {
  currentPage = 1;
  render();
});

document.getElementById("filter").addEventListener("change", () => {
  currentPage = 1;
  render();
});

document.getElementById("prev").addEventListener("click", () => {
  currentPage--;
  render();
});

document.getElementById("next").addEventListener("click", () => {
  currentPage++;
  render();
});

render();
</script>

</body>
</html>
