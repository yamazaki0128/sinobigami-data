body {
  margin: 0;

h1 {

  padding: 15px;
  margin: 0;
  background: #111;
}

.container {
  max-width: 1200px;
  margin: auto;
}

.controls {
  padding: 10px;
  text-align: center;
}

input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 15px;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

.card {
  height: 180px;
  overflow: hidden;
  padding: 15px;
  border-radius: 10px;
  background: linear-gradient(145deg, #2e2e2e, #1f1f1f);
  border: 1px solid #666;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #aaa;
}

.title {
  font-weight: bold;
  margin-bottom: 5px;
}

.meta {
  font-size: 13px;
  color: #bbb;
  margin-bottom: 8px;
}

.desc {
  font-size: 14px;
  line-height: 1.6;
  max-height: 120px;
  overflow: auto;
}

/* ページネーション */
.pagination {
  text-align: center;
  padding: 10px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>

const grid = document.getElementById("grid");

function getFilteredData() {
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  return data
    .filter(d => d.name.toLowerCase().includes(search))
    .filter(d => !filter || d.type === filter);
}

function render() {
  const filtered = getFilteredData();
  const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);

  if (currentPage > totalPages) currentPage = totalPages || 1;

  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageData = filtered.slice(start, start + ITEMS_PER_PAGE);

  grid.innerHTML = "";

  if (filtered.length === 0) {
    grid.innerHTML = "<p style='text-align:center;'>該当する忍法がありません</p>";
    document.getElementById("pageInfo").textContent = "";
    return;
  }

  pageData.forEach(d => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="title">${d.name}</div>
      <div class="meta">${d.type} / ${d.meta}</div>
      <div class="desc">${d.desc}</div>
    `;
    grid.appendChild(card);
  });

  document.getElementById("pageInfo").textContent =
    `${currentPage} / ${totalPages}`;

  document.getElementById("prev").disabled = currentPage === 1;
  document.getElementById("next").disabled = currentPage === totalPages;
}

// イベント
document.getElementById("search").addEventListener("input", () => {
  currentPage = 1;
  render();
});

document.getElementById("filter").addEventListener("change", () => {
  currentPage = 1;
  render();
});

document.getElementById("prev").addEventListener("click", () => {
  currentPage--;
  render();
});

document.getElementById("next").addEventListener("click", () => {
  currentPage++;
  render();
});

render();
</script>
