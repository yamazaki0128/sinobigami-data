<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>忍法みるみる君</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: #1a1a1a;
  color: #fff;
}

/* タイトル */
header {
  text-align: center;
  padding: 30px 10px;
  background: #111;
  border-bottom: 2px solid #444;
}

header h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: 3px;
}

/* コンテナ */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* スマホ */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* カード */
.card {
  background: linear-gradient(145deg, #2a2a2a, #1f1f1f);
  border: 1px solid #555;
  border-radius: 12px;
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.25s;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
}

/* カードタイトル */
.card h2 {
  margin: 0;
  font-size: 20px;
}

/* 装飾ライン */
.card::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: #888;
}

/* 流派ごとの色 */
.kurama::after { background: #4fc3f7; }
.hagure::after { background: #81c784; }
.shiba::after { background: #e57373; }
.hirasaka::after { background: #ba68c8; }
.gakuen::after { background: #ffd54f; }
.kettou::after { background: #90a4ae; }

footer {
  text-align: center;
  padding: 15px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <h1>忍法みるみる君</h1>
</header>

<div class="container">

<div class="grid">

  <div class="card shiba" onclick="location.href='shiba.html'">
    <h2>斜歯忍軍</h2>
  </div>

  <div class="card kurama" onclick="location.href='kurama.html'">
    <h2>鞍馬神流</h2>
  </div>

  <div class="card hagure" onclick="location.href='hagure.html'">
    <h2>ハグレモノ</h2>
  </div>

  <div class="card hirasaka" onclick="location.href='hirasaka.html'">
    <h2>比良坂機関</h2>
  </div>

  <div class="card gakuen" onclick="location.href='gakuen.html'">
    <h2>私立御斎学園</h2>
  </div>

  <div class="card kettou" onclick="location.href='kettou.html'">
    <h2>隠忍の血統</h2>
  </div>

</div>

</div>

<footer>
  © 忍法みるみる君
</footer>

</body>
</html>
