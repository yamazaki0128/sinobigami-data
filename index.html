<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シノビガミ徹底攻略</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: #2a2a2a;
  color: #fff;
}

/* タイトル */
header {
  text-align: center;
  padding: 40px 10px;
  background: linear-gradient(180deg, #111, #1a1a1a);
  border-bottom: 2px solid #444;
}

header h1 {
  margin: 0;
  font-size: 32px;
  letter-spacing: 4px;
  text-shadow: 0 0 10px rgba(255,255,255,0.2),
               0 0 20px rgba(255,0,0,0.3);
}

/* コンテナ */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 30px 20px;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
}

/* スマホ */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* カード */
.card {
  background: linear-gradient(145deg, #2e2e2e, #1f1f1f);
  border: 1px solid #666;
  border-radius: 14px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

/* ホバー時 */
.card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 10px 30px rgba(0,0,0,0.7);
}

/* 光エフェクト */
.card::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: rotate(25deg);
  transition: 0.5s;
  opacity: 0;
}

.card:hover::before {
  opacity: 1;
  top: -20%;
  left: -20%;
}

/* カードタイトル */
.card h2 {
  margin: 0;
  font-size: 22px;
  letter-spacing: 2px;
}

/* 装飾ライン */
.card::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 4px;
  transition: 0.3s;
}

/* ホバー時にライン強調 */
.card:hover::after {
  height: 6px;
  filter: brightness(1.4);
}

/* 流派カラー（指定イメージ） */
.general::after { background: #9e9e9e; } /* 汎用：グレー */
.shiba::after   { background: #1b5e20; } /* 斜歯：濃い緑 */
.kurama::after  { background: #1976d2; } /* 鞍馬：青 */
.hagure::after  { background: #f57c00; } /* ハグレ：オレンジ */
.hirasaka::after{ background: #fbc02d; } /* 比良坂：黄色 */
.gakuen::after  { background: #ec407a; } /* 私立：ピンク */
.kettou::after  { background: #430001; } /* 隠忍：濃い赤 */
.koryu::after   { background: #4a148c; } /* 古流：濃い紫 */

/* フッター */
footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: #333;
    color: white;
    text-align: center;
    line-height: 60px;
}
</style>
</head>

<body>

<header>
  <h1>シノビガミ徹底攻略</h1>
</header>

<div class="container">

<div class="grid">

  <!-- 汎用忍法 -->
  <div class="card general" onclick="location.href='hanyou.html'">
    <h2>汎用忍法</h2>
  </div>

  <div class="card hasuba" onclick="location.href='hasuba.html'">
    <h2>斜歯忍軍</h2>
  </div>

  <div class="card kurama" onclick="location.href='kurama.html'">
    <h2>鞍馬神流</h2>
  </div>

  <div class="card hagure" onclick="location.href='hagure.html'">
    <h2>ハグレモノ</h2>
  </div>

  <div class="card hirasaka" onclick="location.href='hirasaka.html'">
    <h2>比良坂機関</h2>
  </div>

  <div class="card gakuen" onclick="location.href='gakuen.html'">
    <h2>私立御斎学園</h2>
  </div>

  <div class="card oni" onclick="location.href='oni.html'">
    <h2>隠忍の血統</h2>
  </div>

  <!-- 古流忍法 -->
  <div class="card koryu" onclick="location.href='koryu.html'">
    <h2>古流忍法</h2>
  </div>

</div>

</div>

<footer>
  © シノビガミ徹底攻略
</footer>

</body>
</html>
